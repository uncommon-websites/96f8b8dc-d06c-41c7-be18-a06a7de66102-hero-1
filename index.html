<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Holo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes scaleIn {
            from { opacity: 0; transform: scale(0.97); }
            to { opacity: 1; transform: scale(1); }
        }

        .animate-fade-in-up {
            opacity: 0;
            animation: fadeInUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        .animate-fade-in {
            opacity: 0;
            animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        .animate-scale-in {
            opacity: 0;
            animation: scaleIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .delay-0 { animation-delay: 0ms; }
        .delay-100 { animation-delay: 100ms; }
        .delay-200 { animation-delay: 200ms; }
        .delay-300 { animation-delay: 300ms; }
        .delay-400 { animation-delay: 400ms; }
        
        @media (prefers-reduced-motion: reduce) {
            .animate-fade-in-up, .animate-fade-in, .animate-scale-in {
                animation: none;
                opacity: 1;
                transform: none;
            }
        }
    </style>
</head>
<body class="bg-[#fafafa] text-[#111111] font-sans antialiased selection:bg-[#0099ff] selection:text-white min-h-screen flex flex-col">

    <!-- Header -->
    <header class="w-full max-w-[1440px] mx-auto px-6 md:px-10 py-6 flex items-center justify-between animate-fade-in delay-0 z-50 relative">
        <div class="flex items-center gap-8">
            <!-- Logo -->
            <a href="#" class="flex items-center justify-center w-8 h-8 bg-black rounded-lg hover:opacity-80 transition-opacity">Launch Your Campaign</a>
            <!-- Navigation -->
            <nav class="hidden md:flex items-center gap-6 text-[15px] font-medium">
                <a href="#" class="text-gray-900 hover:text-gray-600 transition-colors">Features</a>
                <a href="#" class="text-gray-900 hover:text-gray-600 transition-colors">Pricing</a>
            </nav>
        </div>
        
        <div class="flex items-center gap-6 text-[15px] font-medium">
            <a href="#" class="text-gray-600 hover:text-gray-900 transition-colors hidden sm:block">Login</a>
            <a href="#" class="bg-[#0099ff] text-white px-4 py-2 rounded-lg hover:opacity-90 transition-colors active:scale-97">Get started</a>
        </div>
    </header>

    <!-- Main Hero Section -->
    <main class="flex-1 w-full max-w-[1200px] mx-auto px-6 md:px-10 pt-16 md:pt-24 pb-20">
        
        <!-- Headline Area -->
        <div class="max-w-5xl animate-fade-in-up delay-100">
            <h1 class="text-[56px] md:text-[72px] lg:text-[84px] leading-[1.05] font-bold tracking-tight text-[#111111]">Transform Your Website URL Into High-Performing AI Marketing Campaigns</h1>
        </div>

        <!-- CTA Buttons -->
        <div class="flex flex-wrap items-center gap-4 mt-10 animate-fade-in-up delay-200">
            <a href="#" class="bg-[#0099ff] text-white px-6 py-3.5 rounded-xl font-medium text-[17px] hover:opacity-90 transition-colors active:scale-97 shadow-sm">
                Get started
            </a>
            <a href="#" class="bg-white border border-gray-200 text-gray-700 px-6 py-3.5 rounded-xl font-medium text-[17px] flex items-center gap-2.5 hover:bg-gray-50 transition-colors shadow-sm active:scale-97">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-gray-400">
                    <rect x="3" y="8" width="18" height="12" rx="2"></rect>
                    <path d="M12 8V4"></path>
                    <path d="M10 4h4"></path>
                    <circle cx="9" cy="14" r="1.5" fill="currentColor" stroke="none"></circle>
                    <circle cx="15" cy="14" r="1.5" fill="currentColor" stroke="none"></circle>
                    <path d="M10 19h4"></path>
                </svg>
                Request a demo
            </a>
        </div>

        <!-- Update Notice -->
        <div class="flex items-center gap-2 mt-12 text-[14px] text-gray-500 font-medium animate-fade-in-up delay-300">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor" class="text-gray-400">
                <path d="M12 0L13.5 8.5L22 10L13.5 11.5L12 20L10.5 11.5L2 10L10.5 8.5L12 0Z" />
            </svg>
            <span>Feb 16: private meeting notes, apple reminders sync, audio improvements</span>
        </div>

        <!-- Hero Image Mockup -->
        <div class="mt-6 animate-scale-in delay-400 relative">
            <!-- Subtle glow behind image -->
            <div class="absolute inset-0 bg-gradient-to-b from-transparent to-gray-100/50 rounded-2xl -z-10 blur-xl"></div>
            
            <img 
                src="https://imolwncbqxugevwmleed.supabase.co/storage/v1/object/public/public-assets/hero-images/96f8b8dc-d06c-41c7-be18-a06a7de66102/hero-1-img-0-1773913720536.png" 
                alt="Holo Interface" 
                class="w-full h-auto rounded-xl border border-gray-200/80 shadow-[0_8px_30px_rgb(0,0,0,0.04)] object-cover object-top"
                style="max-height: 700px;"
            >
        </div>

    </main>

</body>
</html>
